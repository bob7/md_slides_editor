const navigationJS = `
var slides=document.getElementsByTagName("section");
var totalSlides=slides.length;
var prev=[37,75,72]; var next=[39,74,76,13];
function percentageVisible(element){
	const viewHeight=(window.innerHeight||document.documentElement.clientHeight);
	const bounds=element.getBoundingClientRect();
	if(bounds.bottom<0||bounds.top>viewHeight){return 0;}
	if(bounds.top<0&&bounds.bottom>viewHeight){return bounds.height*100/viewHeight;}
	else if(bounds.top<0){return bounds.bottom*100/viewHeight;}
	else if(bounds.bottom>viewHeight){return(viewHeight-bounds.top)*100/viewHeight;}
	return 100;
}
function getCurrentSlide(){
	var index=0; var maxPercent=0;
	for(var i=0;i<totalSlides;i++){
		let p=percentageVisible(slides[i]); if(p>maxPercent){index=i; maxPercent=p;}
	}
	return index;
}
function navigate(nextSlide){
	let target=nextSlide;if(nextSlide<0){target=0;} else if(nextSlide>=totalSlides){target=totalSlides-1;}
	window.scrollTo(0,slides[target].offsetTop * parseFloat(document.querySelector('.slides-wrapper')?.style.transform.replace(/[^0-9.]/g, '') || 1));
}
document.addEventListener("keydown",event=>{
	let code=event.keyCode;
	if(prev.includes(code)){navigate(getCurrentSlide()-1);} else if(next.includes(code)){navigate(getCurrentSlide()+1);}
});
`;

const previewResizerJS = `
function autofitSlides() {
    const wrapper = document.querySelector('.slides-wrapper');
    const container = document.querySelector('.preview-viewport-container');
    if (!wrapper || !container) return;
    
    const targetWidth = 1104; 
    const availableWidth = window.innerWidth - 30; 
    
    const scale = (availableWidth / targetWidth) * 0.94;
    wrapper.style.transform = "scale(" + scale + ")";
    
    const unscaledHeight = wrapper.scrollHeight;
    container.style.height = (unscaledHeight * scale) + "px";
}
window.addEventListener('resize', autofitSlides);
window.addEventListener('DOMContentLoaded', autofitSlides);
setTimeout(autofitSlides, 100);
`;

const defaultMarkdown = `title: Presentation 
subtitle: Markdown with custom latex macros
author: Researcher

Native KaTeX macros work as: $\\llbracket x \\rrbracket$, $\\mathbb{R}$, $\\mathcal{P}(X)$.

function parseBlock(block) {
    let className = "";
    block = block.trim();
    
    if (block.startsWith("center\n") || block.startsWith("center\r\n")) { className = " class='centered'"; block = block.replace(/^center[\r\n]+/, ""); }
    else if (block.startsWith("thanks\n") || block.startsWith("thanks\r\n")) { className = " class='thanks'"; block = block.replace(/^thanks[\r\n]+/, ""); }
    else if (block.startsWith("iframe\n") || block.startsWith("iframe\r\n")) { className = " class='includehtml'"; block = block.replace(/^iframe[\r\n]+/, ""); }
    else if (block.startsWith("frozen\n") || block.startsWith("frozen\r\n")) { className = " class='frozen'"; block = block.replace(/^frozen[\r\n]+/, ""); }

    let htmlContent = marked.parse(block);
    htmlContent = htmlContent.replace(/<p>(<img[\s\S]*?)<\/p>/g, '$1');

    return `<section${className}>\n${htmlContent}</section>\n`;
}

function parseMacroFileContents(rawContent) {
    const macros = [];
    const cmdRegex = /\\newcommand\s*\{\s*\\([a-zA-Z0-9]+)\s*\}(?:\[(\d+)\])?\s*\{/g;
    let match;
    while ((match = cmdRegex.exec(rawContent)) !== null) {
        const name = match[1];
        const numArgs = match[2] ? parseInt(match[2]) : 0;
        let start = cmdRegex.lastIndex;
        let depth = 1;
        let i = start;
        while (i < rawContent.length && depth > 0) {
            if (rawContent[i] === '{' && rawContent[i-1] !== '\\') depth++;
            else if (rawContent[i] === '}' && rawContent[i-1] !== '\\') depth--;
            i++;
        }
        const body = rawContent.slice(start, i - 1);
        macros.push({name, numArgs, body});
        cmdRegex.lastIndex = i;
    }
    return macros;
}

function expandCustomMacros(text) {
    if (!window.customLoadedMacros || window.customLoadedMacros.length === 0) return text;

    function readBalancedGroup(str, startIndex) {
        if (str[startIndex] !== '{') return null;
        let depth = 1;
        let i = startIndex + 1;
        while (i < str.length && depth > 0) {
            if (str[i] === '{' && str[i - 1] !== '\\') depth++;
            else if (str[i] === '}' && str[i - 1] !== '\\') depth--;
            i++;
        }
        if (depth !== 0) return null;
        return {content: str.slice(startIndex + 1, i - 1), end: i};
    }

    for (const macro of window.customLoadedMacros) {
        let result = "";
        let i = 0;
        while (i < text.length) {
            const macroCall = "\\" + macro.name;
            if (text.startsWith(macroCall, i)) {
                let pos = i + macroCall.length;
                const args = [];
                let ok = true;
                for (let k = 0; k < macro.numArgs; k++) {
                    while (/\s/.test(text[pos])) pos++;
                    const group = readBalancedGroup(text, pos);
                    if (!group) { ok = false; break; }
                    args.push(group.content);
                    pos = group.end;
                }
                if (ok) {
                    let expansion = macro.body;
                    for (let k = 0; k < args.length; k++) {
                        expansion = expansion.replaceAll("#" + (k + 1), args[k]);
                    }
                    result += expansion;
                    i = pos;
                    continue;
                }
            }
            result += text[i];
            i++;
        }
        text = result;
    }
    return text;
}

function expandMacrosOnlyInMath(text) {
    const mathRegex = /\$\$[\s\S]*?\$\$|\$[^$]+\$/g;
    return text.replace(mathRegex, (mathBlock) => expandCustomMacros(mathBlock));
}

function buildHTMLDocument(markdownText, isForPreview = false) {
    const blocks = markdownText.split(/\n---\n|\r\n---\r\n/);
    const header = blocks[0] || "";

    let meta = { title: "", subtitle: "", author: "", coauthors: "", affiliation: "" };
    header.split(/\r?\n/).forEach(line => {
        const match = line.match(/^(title|subtitle|author|coauthors|affiliation)\s*:\s*(.*)$/i);
        if (match) { meta[match[1].toLowerCase()] = match[2].trim(); }
    });

    let titleSection = `
    <section>
        <h1>${meta.title}</h1>
        <p class="subtitle">${meta.subtitle}</p>
        <p class="author">${meta.author}</p>
        <p class="affiliation">${meta.affiliation}</p>
        <p class="coauthors">${meta.coauthors}</p>
    </section>`;

    let numberedSlidesCount = 0;
    blocks.slice(1).forEach(block => {
        let b = block.trim();
        if (!b.startsWith("center\n") && !b.startsWith("thanks\n") && !b.startsWith("iframe\n") && !b.startsWith("frozen\n")) {
            numberedSlidesCount++;
        }
    });

    const dynamicCSS = minislidesCSS.replace('TOTAL_SLIDES_PLACEHOLDER', numberedSlidesCount);
    const slideSections = blocks.slice(1).map(parseBlock).join('');
    const fullSlides = titleSection + slideSections;

    const regularContent = `<div class="slides">${fullSlides}</div>`;
    const previewWrappedContent = `
    <div class="preview-viewport-container">
        <div class="slides-wrapper">
            <div class="slides">${fullSlides}</div>
        </div>
    </div>`;

    // FIXED: Proper KaTeX macro object + consistent version
    const katexMacros = {};
    window.customLoadedMacros.forEach(m => {
        katexMacros["\\" + m.name] = m.body;
    });

	const dynamicKatexJS = `
	document.addEventListener("DOMContentLoaded", function() {
	    renderMathInElement(document.body, {
	        delimiters: [
	            {left: '$$', right: '$$', display: true},
	            {left: '$', right: '$', display: false},
	            {left: '\\\\(', right: '\\\\)', display: false},
	            {left: '\\\\[', right: '\\\\]', display: true}
	        ],
	        macros: ${JSON.stringify(katexMacros)},
	        throwOnError: false
	    });
	});
	`;

    return `<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">

}

function renderSlides() {
    let markdownText = document.getElementById('editor').value;
    markdownText = expandMacrosOnlyInMath(markdownText);
    const compiledHTML = buildHTMLDocument(markdownText, true);
    const iframe = document.getElementById('preview-iframe');
    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
    iframeDoc.open();
    iframeDoc.write(compiledHTML);
    iframeDoc.close();
}

function openFile(event) {
    const input = event.target;
    if (!input.files || input.files.length === 0) return;
    const reader = new FileReader();
    reader.onload = function() {
        document.getElementById('editor').value = reader.result;
        renderSlides();
    };
    reader.readAsText(input.files[0]);
}

function loadMacrosFile(event) {
    const input = event.target;
    if (!input.files || input.files.length === 0) return;
    const reader = new FileReader();
    reader.onload = function() {
        const rawContent = reader.result;
        const parsedMacros = parseMacroFileContents(rawContent);
        window.customLoadedMacros = parsedMacros;
        renderSlides();
    };
    reader.readAsText(input.files[0]);
}

function saveMarkdown() {
    const text = document.getElementById('editor').value;
    const blob = new Blob([text], { type: 'text/markdown' });
    triggerDownload(blob, 'slides.md');
}

function exportHTML() {
    const text = document.getElementById('editor').value;
    let nativeHTML = buildHTMLDocument(text, false);
    const blob = new Blob([nativeHTML], { type: 'text/html' });
    triggerDownload(blob, 'presentation.html');
}

function printPDF() {
    const iframe = document.getElementById('preview-iframe');
    if (!iframe || !iframe.contentWindow) return;
    iframe.contentWindow.print();
}

function triggerDownload(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

window.addEventListener('resize', () => {
    const iframe = document.getElementById('preview-iframe');
    if(iframe.contentWindow && iframe.contentWindow.autofitSlides) {
        iframe.contentWindow.autofitSlides();
    }
});
</script>
</body>
